<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" fill="none">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="900" y2="520" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#111127"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" fill="url(#bg2)" rx="12"/>

  <!-- Title -->
  <text x="450" y="38" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="white" text-anchor="middle" letter-spacing="1">ARCHITECTURE</text>

  <!-- ===== TOP ROW: User / App ===== -->
  <rect x="350" y="55" width="200" height="40" rx="8" fill="#1e1e2e" stroke="#3b3b5c" stroke-width="1"/>
  <text x="450" y="80" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#e2e8f0" text-anchor="middle">User / LLM Application</text>

  <!-- Arrow down -->
  <line x1="450" y1="95" x2="450" y2="120" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto" fill="#6366f1">
      <polygon points="0 0, 8 3, 0 6"/>
    </marker>
  </defs>

  <!-- ===== API GATEWAY ROW ===== -->
  <rect x="250" y="120" width="400" height="36" rx="8" fill="#6366f1" fill-opacity="0.15" stroke="#6366f1" stroke-opacity="0.4" stroke-width="1"/>
  <text x="450" y="143" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#a5b4fc" text-anchor="middle">FastAPI Gateway  ·  Auth  ·  Rate Limiting  ·  75+ Endpoints</text>

  <!-- Arrow down split -->
  <line x1="300" y1="156" x2="300" y2="185" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="600" y1="156" x2="600" y2="185" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- ===== MAIN 3 COLUMNS ===== -->

  <!-- Column 1: Runtime Guard -->
  <rect x="60" y="185" width="250" height="200" rx="10" fill="#1e1e2e" stroke="#6366f1" stroke-opacity="0.3" stroke-width="1"/>
  <rect x="60" y="185" width="250" height="32" rx="10" fill="#6366f1" fill-opacity="0.1"/>
  <text x="185" y="206" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#818cf8" text-anchor="middle">Runtime Guard</text>

  <g font-family="system-ui, sans-serif" font-size="11" fill="#a1a1aa">
    <text x="80" y="235">POST /guard/scan</text>
    <text x="80" y="255">├─ Injection Detector</text>
    <text x="80" y="275">├─ PII / Secret Detector</text>
    <text x="80" y="295">├─ RAG Injection Detector</text>
    <text x="80" y="315">├─ Tool Abuse Detector</text>
    <text x="80" y="335">├─ Hallucination Scorer</text>
    <text x="80" y="355">├─ Consensus Engine</text>
    <text x="80" y="375">└─ Risk Score 0–100</text>
  </g>

  <!-- Column 2: Red-Team -->
  <rect x="325" y="185" width="250" height="200" rx="10" fill="#1e1e2e" stroke="#f59e0b" stroke-opacity="0.3" stroke-width="1"/>
  <rect x="325" y="185" width="250" height="32" rx="10" fill="#f59e0b" fill-opacity="0.1"/>
  <text x="450" y="206" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#fbbf24" text-anchor="middle">Red-Team Engine</text>

  <g font-family="system-ui, sans-serif" font-size="11" fill="#a1a1aa">
    <text x="345" y="235">POST /campaigns</text>
    <text x="345" y="255">├─ 5 Attack Categories</text>
    <text x="345" y="275">├─ 5 Multi-turn Strategies</text>
    <text x="345" y="295">├─ 6 Obfuscation Transforms</text>
    <text x="345" y="315">├─ Adaptive Red Agent</text>
    <text x="345" y="335">├─ Campaign Metrics</text>
    <text x="345" y="355">├─ Campaign Diff</text>
    <text x="345" y="375">└─ JSON / CSV Export</text>
  </g>

  <!-- Column 3: Threat Intelligence -->
  <rect x="590" y="185" width="250" height="200" rx="10" fill="#1e1e2e" stroke="#10b981" stroke-opacity="0.3" stroke-width="1"/>
  <rect x="590" y="185" width="250" height="32" rx="10" fill="#10b981" fill-opacity="0.1"/>
  <text x="715" y="206" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#34d399" text-anchor="middle">Threat Intelligence</text>

  <g font-family="system-ui, sans-serif" font-size="11" fill="#a1a1aa">
    <text x="610" y="235">Analytics Pipeline</text>
    <text x="610" y="255">├─ Signature Registry</text>
    <text x="610" y="275">├─ MinHash Clustering</text>
    <text x="610" y="295">├─ Z-score Anomaly Detection</text>
    <text x="610" y="315">├─ Risk Trend (7d / 30d)</text>
    <text x="610" y="335">├─ SIEM Export (CEF + JSON)</text>
    <text x="610" y="355">├─ HMAC Webhooks</text>
    <text x="610" y="375">└─ Model Risk Profiling</text>
  </g>

  <!-- Connecting arrows between columns -->
  <line x1="310" y1="290" x2="325" y2="290" stroke="#6366f1" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
  <line x1="575" y1="290" x2="590" y2="290" stroke="#10b981" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>

  <!-- ===== BOTTOM: Storage + SaaS Layer ===== -->
  <line x1="450" y1="385" x2="450" y2="410" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- SaaS Platform bar -->
  <rect x="100" y="410" width="700" height="36" rx="8" fill="#6366f1" fill-opacity="0.08" stroke="#6366f1" stroke-opacity="0.25" stroke-width="1"/>
  <text x="450" y="433" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#818cf8" text-anchor="middle">Multi-tenant Orgs  ·  RBAC  ·  Usage Metering  ·  Stripe Billing  ·  Audit Trail</text>

  <!-- Storage bar -->
  <rect x="100" y="460" width="700" height="36" rx="8" fill="#1e1e2e" stroke="#3b3b5c" stroke-width="1"/>
  <text x="450" y="483" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#71717a" text-anchor="middle">SQLite (WAL)  ·  20+ Tables  ·  SQLModel ORM  ·  Inline Migrations</text>

  <!-- Arrow between SaaS and Storage -->
  <line x1="450" y1="446" x2="450" y2="460" stroke="#3b3b5c" stroke-width="1" marker-end="url(#arrowhead)"/>
</svg>