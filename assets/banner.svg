<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="50%" stop-color="#111127"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="300" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0"/>
      <stop offset="20%" stop-color="#6366f1" stop-opacity="0.6"/>
      <stop offset="80%" stop-color="#818cf8" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#6366f1" stroke-width="0.5">
    <line x1="0" y1="50" x2="1200" y2="50"/>
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="150" x2="1200" y2="150"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="250" x2="1200" y2="250"/>
    <line x1="200" y1="0" x2="200" y2="300"/>
    <line x1="400" y1="0" x2="400" y2="300"/>
    <line x1="600" y1="0" x2="600" y2="300"/>
    <line x1="800" y1="0" x2="800" y2="300"/>
    <line x1="1000" y1="0" x2="1000" y2="300"/>
  </g>

  <!-- Shield icon -->
  <g transform="translate(460, 70)">
    <path d="M30 4 L56 16 L56 40 C56 62 44 74 30 80 C16 74 4 62 4 40 L4 16 Z" fill="none" stroke="url(#accent)" stroke-width="2.5" opacity="0.9"/>
    <path d="M22 42 L28 48 L40 34" fill="none" stroke="#818cf8" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Title -->
  <text x="530" y="115" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="44" font-weight="700" fill="white" letter-spacing="-0.5">PromptSentinel</text>

  <!-- Accent line -->
  <rect x="350" y="140" width="500" height="1.5" fill="url(#line)" rx="1"/>

  <!-- Tagline -->
  <text x="600" y="175" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="18" fill="#a1a1aa" text-anchor="middle" letter-spacing="0.5">Runtime Guard + Red-Team Campaigns for LLM Security</text>

  <!-- Feature pills -->
  <g font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="500">
    <!-- Pill 1 -->
    <rect x="280" y="205" width="120" height="28" rx="14" fill="#6366f1" fill-opacity="0.12" stroke="#6366f1" stroke-opacity="0.3" stroke-width="1"/>
    <text x="340" y="223" fill="#a5b4fc" text-anchor="middle">7 Detectors</text>

    <!-- Pill 2 -->
    <rect x="415" y="205" width="120" height="28" rx="14" fill="#6366f1" fill-opacity="0.12" stroke="#6366f1" stroke-opacity="0.3" stroke-width="1"/>
    <text x="475" y="223" fill="#a5b4fc" text-anchor="middle">5 Attack Types</text>

    <!-- Pill 3 -->
    <rect x="550" y="205" width="120" height="28" rx="14" fill="#6366f1" fill-opacity="0.12" stroke="#6366f1" stroke-opacity="0.3" stroke-width="1"/>
    <text x="610" y="223" fill="#a5b4fc" text-anchor="middle">Risk Scoring</text>

    <!-- Pill 4 -->
    <rect x="685" y="205" width="120" height="28" rx="14" fill="#6366f1" fill-opacity="0.12" stroke="#6366f1" stroke-opacity="0.3" stroke-width="1"/>
    <text x="745" y="223" fill="#a5b4fc" text-anchor="middle">Threat Intel</text>

    <!-- Pill 5 -->
    <rect x="820" y="205" width="100" height="28" rx="14" fill="#6366f1" fill-opacity="0.12" stroke="#6366f1" stroke-opacity="0.3" stroke-width="1"/>
    <text x="870" y="223" fill="#a5b4fc" text-anchor="middle">No ML</text>
  </g>

  <!-- Bottom tagline -->
  <text x="600" y="270" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#52525b" text-anchor="middle">Self-hostable  ·  Deterministic  ·  Rule-based  ·  FastAPI + Next.js</text>
</svg>